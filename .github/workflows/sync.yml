name: Bill Sync — 2026 Idaho Session

on:
  schedule:
    # Every 2 hours, 8am–10pm Mountain Time (UTC-7)
    - cron: '0 15 * * *'   #  8:00 AM MT
    - cron: '0 17 * * *'   # 10:00 AM MT — during floor session
    - cron: '0 19 * * *'   # 12:00 PM MT — after morning session
    - cron: '0 21 * * *'   #  2:00 PM MT — afternoon session
    - cron: '0 23 * * *'   #  4:00 PM MT
    - cron: '0 1 * * *'    #  6:00 PM MT
    - cron: '0 3 * * *'    #  8:00 PM MT
    - cron: '0 5 * * *'    # 10:00 PM MT — final sweep
  workflow_dispatch:        # Allow manual run from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run sync
        run: npx tsx scripts/sync-daily.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}

      - name: Assign bill committees
        run: npx tsx scripts/assign-bill-committees.ts --year 2026
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
